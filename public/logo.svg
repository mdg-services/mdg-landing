<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" role="img" aria-label="MDG Services">
  <g fill="currentColor">
    <!-- Circle frame -->
    <circle cx="90" cy="100" r="78" fill="none" stroke="currentColor" stroke-width="6"/>

    <!-- Group of people (heads + shoulders) -->
    <!-- left person -->
    <circle cx="58" cy="70" r="11"/>
    <path d="M40 96c0-9 8-16 18-16s18 7 18 16v6H40z"/>
    <!-- center person (taller, behind) -->
    <circle cx="86" cy="60" r="13"/>
    <path d="M64 88c0-11 10-20 22-20s22 9 22 20v6H64z"/>
    <!-- right person -->
    <circle cx="118" cy="70" r="11"/>
    <path d="M100 96c0-9 8-16 18-16s18 7 18 16v6h-36z"/>

    <!-- Hand cradling underneath -->
    <!-- wrist/cuff -->
    <path d="M122 152c4 2 8 2 12 1l8-2c2-1 4 0 5 2 1 3-1 6-4 7l-12 4c-5 2-10 2-15 0z"/>
    <!-- palm -->
    <path d="M40 132c-4-3-5-9-2-13 3-3 8-4 12-1l16 9c6 3 12 5 18 5h26c4 0 6 3 6 6 0 4-2 7-6 8l-22 4c-12 2-25 0-36-5z"/>
    <!-- thumb -->
    <path d="M40 132c-3-2-7-1-9 2-2 3-1 7 2 9l8 5 6-8z"/>

    <!-- MDG wordmark -->
    <g font-family="Inter, Arial, sans-serif" font-weight="700">
      <text x="195" y="92" font-size="72" letter-spacing="2">MDG</text>
    </g>

    <!-- services wordmark (heavy italic) -->
    <g font-family="'Plus Jakarta Sans', Inter, sans-serif" font-weight="900" font-style="italic">
      <text x="190" y="172" font-size="74" letter-spacing="-1">services</text>
    </g>
  </g>
</svg>
